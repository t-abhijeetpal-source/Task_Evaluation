[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --cov=app --cov-report=term-missing --cov-fail-under=80
# Zero-warning gate: every warning is an error, so our OWN code can never ship a
# silent deprecation. The single `ignore` below is a known UPSTREAM-only warning:
# starlette.testclient now prefers the `httpx2` package and warns when the
# standard `httpx` is used. We deliberately do NOT adopt `httpx2` (unvetted,
# typosquat-shaped, not in any lockfile) — see docs/RUNBOOK.md. The ignore is
# scoped to that exact message so any other warning still fails the suite.
filterwarnings =
    error
    ignore:Using `httpx` with `starlette.testclient` is deprecated
