apiVersion: v1
kind: ServiceAccount
metadata:
  name: d4-sample
  namespace: d4-sample
  labels:
    app.kubernetes.io/name: d4-sample
    app.kubernetes.io/component: api
# The workload never calls the Kubernetes API, so its pods get NO API token.
# This removes a stolen-token lateral-movement path. No Role/RoleBinding ships
# with this app for the same reason — it needs zero RBAC permissions.
automountServiceAccountToken: false
