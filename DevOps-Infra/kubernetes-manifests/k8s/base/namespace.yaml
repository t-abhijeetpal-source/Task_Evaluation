apiVersion: v1
kind: Namespace
metadata:
  name: d4-sample
  labels:
    app.kubernetes.io/part-of: d4-sample
    name: d4-sample
    # Enforce the restricted Pod Security Standard at the namespace boundary —
    # the kube-apiserver rejects any pod that violates it, independent of the
    # per-pod securityContext below (defence in depth).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
