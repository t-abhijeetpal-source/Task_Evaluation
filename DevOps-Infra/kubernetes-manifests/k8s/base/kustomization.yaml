apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Core, cluster-portable resource set. Overlays (dev/prod) layer environment
# specifics on top via patches. servicemonitor.yaml and secret.yaml.example are
# intentionally excluded (CRD-gated / example-only — see their headers).
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - pdb.yaml
  - hpa.yaml
  - ingress.yaml

# `labels` (not the deprecated commonLabels) with includeSelectors:false so the
# immutable Deployment/Service selectors are never mutated by the overlay.
labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
