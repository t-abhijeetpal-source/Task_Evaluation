[pytest]
testpaths = tests
addopts =
    -q
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=80
# Treat warnings as errors so the suite stays warning-clean (no deprecations leak in).
# The one documented exception: Starlette now nudges toward the `httpx2` package
# for its TestClient. We intentionally stay on `httpx` (httpx2 is not yet a stable,
# widely-vetted dependency), so this single deprecation is filtered rather than chased.
filterwarnings =
    error
    ignore::starlette.exceptions.StarletteDeprecationWarning
