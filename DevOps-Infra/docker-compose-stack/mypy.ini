[mypy]
python_version = 3.12
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
# Resolve the `app` package (api/app) when type-checking `api/app` from the
# stack root, and the top-level `worker` module from `worker/`.
mypy_path = api, worker

# psycopg's pool ships partial typing; don't fail strict on its surface.
[mypy-psycopg_pool.*]
ignore_missing_imports = true
