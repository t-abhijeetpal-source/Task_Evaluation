[pytest]
testpaths = tests
pythonpath = .
addopts =
    -q
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=90
# Warnings are errors so the suite stays clean. The single documented exception:
# Starlette nudges toward the `httpx2` package for its TestClient; we stay on the
# stable `httpx` (parity with the rest of the platform), so that one deprecation
# is filtered rather than chased.
filterwarnings =
    error
    ignore::starlette.exceptions.StarletteDeprecationWarning
    ignore::DeprecationWarning:starlette
