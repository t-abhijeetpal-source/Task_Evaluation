# Alembic configuration for the D2 Jobs API schema.
#
# The database URL is read from the DATABASE_URL environment variable at
# runtime (see alembic/env.py) so the same config works locally and in any
# environment without committing a connection string.
#
#   Generate SQL without a DB:   alembic upgrade head --sql
#   Apply against a live DB:     DATABASE_URL=... alembic upgrade head
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
