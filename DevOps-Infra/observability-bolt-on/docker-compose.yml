name: d6-observability

services:
  app:
    build: .
    container_name: d6-app
    environment:
      APP_ENV: ${APP_ENV:-docker}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Tracing is off by default; the compose.tracing.yml overlay flips it on.
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    networks:
      - obs

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: d6-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - obs

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: d6-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - obs

  grafana:
    image: grafana/grafana:11.4.0
    container_name: d6-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      # Demo default documented in .env.example; override via env for anything real.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Read-only anonymous viewing so dashboards open without a login wall
      # (local demo only). compose.prod.yml disables this.
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    networks:
      - obs

networks:
  obs:
    driver: bridge
