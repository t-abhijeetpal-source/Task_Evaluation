# Alertmanager config for the D6 demo stack.
#
# Alerts fired by Prometheus (see prometheus/alerts.yml) are received and
# grouped here. The demo uses a no-notification default receiver so the stack
# is self-contained — verify routing via Alertmanager's API:
#   curl -s http://localhost:9093/api/v2/alerts | jq .
#
# To page for real, replace the `devnull` receiver with a webhook/Slack/PagerDuty
# config, e.g.:
#   receivers:
#     - name: devnull
#       webhook_configs:
#         - url: https://hooks.slack.com/services/XXX/YYY/ZZZ
route:
  receiver: devnull
  group_by: ["alertname", "service"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: devnull

inhibit_rules:
  # A critical alert for a service silences its warning-level noise.
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["service"]
