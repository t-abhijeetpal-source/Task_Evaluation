apiVersion: 1

# Loki datasource — only reachable when the logs overlay is running
# (compose.logs.yml). Harmless otherwise: Grafana simply marks it unreachable.
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    isDefault: false
    editable: true
