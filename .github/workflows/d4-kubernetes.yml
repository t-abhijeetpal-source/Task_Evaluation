name: D4 Kubernetes

# Validates the K8s workload + manifests on every change:
#   validate  ─┐  (ruff + mypy + pytest/coverage + pip-audit)
#   manifests ─┴─ (kustomize build → kubeconform strict → kube-score)
#   e2e        ─  (manual: kind cluster → deploy-and-verify.sh)
on:
  push:
    paths:
      - "DevOps-Infra/kubernetes-manifests/**"
      - ".github/workflows/d4-kubernetes.yml"
  pull_request:
    paths:
      - "DevOps-Infra/kubernetes-manifests/**"
      - ".github/workflows/d4-kubernetes.yml"
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run the full kind end-to-end deploy + verify"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: d4-kubernetes-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: DevOps-Infra/kubernetes-manifests

env:
  PYTHON_VERSION: "3.12"
  KUBECONFORM_VERSION: "0.6.7"
  KUBE_SCORE_VERSION: "1.18.0"
  K8S_SCHEMA_VERSION: "1.32.0"

jobs:
  # ---- App: lint · type-check · tests/coverage · dependency audit -------------
  validate:
    name: Lint · Types · Tests · Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: DevOps-Infra/kubernetes-manifests/requirements-dev.txt
      - run: pip install -r requirements-dev.txt

      - name: ruff (lint + format)
        run: |
          ruff check .
          ruff format --check .

      - name: mypy --strict
        run: mypy app --strict

      - name: pytest (coverage gate ≥80%)
        run: python -m pytest

      - name: pip-audit (runtime deps)
        run: pip-audit -r requirements.txt

      - run: echo "### ✅ ruff · mypy · pytest (cov ≥80%) · pip-audit passed" >> "$GITHUB_STEP_SUMMARY"

  # ---- Manifests: kustomize build → kubeconform strict → kube-score ----------
  manifests:
    name: Manifests · kubeconform · kube-score
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install kubeconform + kube-score (pinned)
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          curl -fsSL "https://github.com/zegl/kube-score/releases/download/v${KUBE_SCORE_VERSION}/kube-score_${KUBE_SCORE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kube-score
          kubeconform -v && kube-score version

      # kubectl ships on ubuntu-latest runners; `kubectl kustomize` builds overlays.
      - name: Validate manifests (kustomize + kubeconform strict + kube-score)
        run: K8S_VERSION="${K8S_SCHEMA_VERSION}" bash scripts/validate-manifests.sh

      - run: echo "### ✅ kustomize overlays build · kubeconform strict (dev+prod) · kube-score passed" >> "$GITHUB_STEP_SUMMARY"

  # ---- Full kind end-to-end (manual — spins up a real cluster) ---------------
  e2e:
    name: kind E2E (deploy + verify)
    needs: [validate, manifests]
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create kind cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          cluster_name: d4-cluster

      - name: deploy-and-verify.sh (build → load → apply -k → rollout → curl)
        run: bash scripts/deploy-and-verify.sh

      - run: echo "### ✅ Deployed to kind and verified every endpoint live" >> "$GITHUB_STEP_SUMMARY"
