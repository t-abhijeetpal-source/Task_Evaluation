services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: expense-tracker:local
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database file across container restarts.
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=4).status == 200 else sys.exit(1)"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
