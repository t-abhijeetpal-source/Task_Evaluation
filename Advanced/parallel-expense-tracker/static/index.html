<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --border: #e2e6ea;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text: #1f2933;
      --muted: #647184;
      --error: #dc2626;
      --ok: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 { font-size: 1.6rem; margin: 0 0 4px; }
    .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 0.9rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }
    h2 { font-size: 1.1rem; margin: 0 0 14px; }
    form { display: grid; grid-template-columns: 1fr 1fr 2fr auto; gap: 10px; align-items: end; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    input {
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
      width: 100%;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status {
      margin-top: 12px;
      min-height: 20px;
      font-size: 0.9rem;
    }
    #status.error { color: var(--error); }
    #status.ok { color: var(--ok); }
    .summary-grid { display: flex; gap: 28px; flex-wrap: wrap; margin-bottom: 14px; }
    .stat .num { font-size: 1.5rem; font-weight: 700; }
    .stat .lbl { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
    .cat-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-pill {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.85rem;
    }
    .cat-pill strong { color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); }
    th { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
    td.amount { font-variant-numeric: tabular-nums; font-weight: 600; }
    .empty { color: var(--muted); padding: 16px 10px; font-style: italic; }
    @media (max-width: 600px) {
      form { grid-template-columns: 1fr 1fr; }
      form button { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Expense Tracker</h1>
    <p class="subtitle">Track spending by category. Data is served by the backend API.</p>

    <section class="card">
      <h2>Add expense</h2>
      <form id="expense-form" novalidate>
        <div class="field">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="12.50" required />
        </div>
        <div class="field">
          <label for="category">Category</label>
          <input type="text" id="category" name="category" placeholder="food" required />
        </div>
        <div class="field">
          <label for="note">Note</label>
          <input type="text" id="note" name="note" placeholder="lunch" />
        </div>
        <button type="submit" id="submit-btn">Add</button>
      </form>
      <div id="status" role="status" aria-live="polite"></div>
    </section>

    <section class="card">
      <h2>Summary</h2>
      <div class="summary-grid">
        <div class="stat">
          <div class="num" id="summary-total">—</div>
          <div class="lbl">Total</div>
        </div>
        <div class="stat">
          <div class="num" id="summary-count">—</div>
          <div class="lbl">Count</div>
        </div>
      </div>
      <div class="cat-list" id="summary-categories"></div>
    </section>

    <section class="card">
      <h2>Expenses</h2>
      <table>
        <thead>
          <tr>
            <th>Category</th>
            <th>Amount</th>
            <th>Note</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="expense-rows"></tbody>
      </table>
    </section>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
